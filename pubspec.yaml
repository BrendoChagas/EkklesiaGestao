name: ekklesia_gestao
description: Software em Flutter para auxiliar no gerenciamento de atividades da igreja.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^12.1.1

  # Backend
  supabase_flutter: ^2.3.1

  # UI/Style
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
